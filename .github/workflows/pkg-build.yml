name: Package Build Check

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build-and-check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: cd pkg && npm install

    - name: Build packages
      run: cd pkg && npm run build

    - name: Run sanity checks
      run: cd pkg && npm run check

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: diplomatic-packages
        path: pkg/dist/